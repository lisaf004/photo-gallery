{% extends "base.html" %}

{% block content %}

<div class="category-grid">
    {% for category in categories %}
        <div class="category-card">
            <h3>{{ category }}</h3>

            {% if images[category] %}
                <div class="image-list">
                    {% for img in images[category] %}
                        <img src="{{ url_for('static', filename='images/' + category + '/' + img) }}">
                    {% endfor %}
                </div>
            {% else %}
                <p>No images yet</p>
            {% endif %}
        </div>
    {% endfor %}
</div>

{% endblock %}
