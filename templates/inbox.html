{% extends "base.html" %}

{% block content %}

<div class="form-container">
    <h2>Inbox</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Write a message...">
        <button type="submit">Send</button>
    </form>

    <div class="messages">
        {% for msg in messages %}
            <p>{{ msg }}</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
