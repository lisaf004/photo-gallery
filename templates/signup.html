{% extends "base.html" %} {% block content %}
<div class="form-container">
  <h2>Sign Up</h2>

  {% if error %}
  <div
    style="
      background-color: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      border: 1px solid #fca5a5;
      text-align: left;
      font-weight: 500;
    "
  >
    ⚠️ {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <input
      type="text"
      name="username"
      placeholder="Choose a username"
      required
    />
    <input
      type="password"
      name="password"
      placeholder="Choose a secure password"
      required
    />
    <button type="submit">Create Account</button>
  </form>
</div>
{% endblock %}
