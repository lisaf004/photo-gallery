{% extends "base.html" %} 
{% block content %}

<div class="form-container">
  <h2>Upload Photo</h2>

  <!-- 🔥 Flash Messages -->
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div style="background-color:#ffdddd; padding:10px; margin-bottom:10px; border-radius:5px;">
        {% for message in messages %}
          <p style="margin:0; color:red;">{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required />
    
    <input type="text" name="description" placeholder="Add a description..." />
    
    <input
      type="text"
      name="keywords"
      placeholder="Keywords (e.g. mountain, beach)"
    />
    
    <button type="submit">Upload</button>
  </form>
</div>

{% endblock %}
